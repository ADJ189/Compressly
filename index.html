<!-- ABOUT -->
<template id="tpl-about">
<div class="content-page">
  <div class="header-top" style="margin-bottom:.4rem"><span class="badge img">ℹ️</span><h1>About CompressZ</h1></div>
  <p class="page-sub">100% client-side file compression and OCR. No servers. No uploads. No tracking.</p>

  <h2>How it works</h2>
  <p>CompressZ runs entirely in your browser using WebAssembly, the Canvas API, WebCodecs, and two neural OCR engines. Every byte of your files stays on your device throughout the entire process.</p>

  <h2>Technology stack</h2>
  <div class="tech-grid">
    <div class="tech-card"><h3>🦀 FFmpeg.wasm</h3><p>Compiled C FFmpeg to WebAssembly. Handles video, audio, and GIF compression with full codec support. Multithreaded via SharedArrayBuffer.</p></div>
    <div class="tech-card"><h3>🖼️ Canvas API</h3><p>OffscreenCanvas + ImageBitmap for hardware-accelerated image decoding and encoding. WebP and AVIF encoded by the browser's own GPU codec.</p></div>
    <div class="tech-card"><h3>📄 PDF.js + pdf-lib</h3><p>PDF.js 4.4 renders pages to canvas. pdf-lib 1.17 repackages images structurally. Two-strategy compression for optimal results.</p></div>
    <div class="tech-card"><h3>🎬 WebCodecs</h3><p>W3C API for hardware-accelerated video encode/decode. GPU tier-2 fallback when FFmpeg.wasm is unavailable.</p></div>
    <div class="tech-card"><h3>🔤 Tesseract.js 5</h3><p>LSTM neural OCR compiled to SIMD-accelerated WASM. 100+ languages, ~10 MB, runs offline after first load.</p></div>
    <div class="tech-card"><h3>🧠 PaddleOCR PP-OCRv3</h3><p>Baidu's three-stage pipeline via WebGL (~25 MB). Best for tables, CJK, multi-column layouts and complex scans.</p></div>
  </div>

  <h2>PDF compression strategies</h2>
  <p><strong>Strategy A (structural):</strong> Walks the PDF XObject resource dictionary, finds embedded images, decodes them, downscales to target DPI via OffscreenCanvas, re-encodes as JPEG, and splices in-place. Text, fonts, and vectors are never rasterised.</p>
  <p><strong>Strategy B (canvas render):</strong> PDF.js renders each page to OffscreenCanvas with <code>colorSpace: 'srgb'</code> and <code>intent: 'print'</code>, then pdf-lib embeds the JPEG. Used for Extreme preset and as fallback for encrypted PDFs.</p>

  <h2>Video compression tiers</h2>
  <p>Three-tier fallback: (1) FFmpeg.wasm with multithreading when SharedArrayBuffer is available, (2) WebCodecs GPU-accelerated H.264 on Chrome/Safari, (3) MediaRecorder canvas capture as universal fallback.</p>
</div>
</template>

<!-- DOCS -->
<template id="tpl-docs">
<div class="content-page">
  <div class="header-top" style="margin-bottom:.4rem"><span class="badge audio">📖</span><h1>Documentation</h1></div>
  <p class="page-sub">Technical reference for all compression options and browser compatibility.</p>

  <h2>Image options</h2>
  <ul>
    <li><code>format</code> — <code>image/webp</code> (default), <code>image/jpeg</code>, <code>image/png</code>, <code>image/avif</code></li>
    <li><code>quality</code> — 0.01–0.99. Ignored for PNG. Default: WebP 0.82, JPEG 0.85, AVIF 0.70.</li>
    <li><code>maxWidth / maxHeight</code> — Downscale preserving aspect ratio.</li>
    <li><code>targetSizeKB</code> — 14-iteration binary search to hit this file size.</li>
  </ul>

  <h2>PDF options</h2>
  <ul>
    <li><code>pdfCompressionLevel</code> — <code>low</code> (220 DPI, q=0.85), <code>recommended</code> (150 DPI, q=0.72), <code>extreme</code> (96 DPI, q=0.45 + canvas render)</li>
    <li><code>targetSizeKB</code> — Binary-searches per-image/per-page JPEG quality to approximate total target size. Accepts MB or KB in the UI.</li>
  </ul>

  <h2>Video options</h2>
  <ul>
    <li><code>videoCodec</code> — <code>h264</code>, <code>h265</code>, <code>vp9</code>, <code>vp8</code>, <code>av1</code></li>
    <li><code>quality</code> — Maps to CRF 18–35. VP9/AV1 use <code>-b:v 0</code> with equivalent CRF.</li>
    <li><code>targetSizeKB</code> — Calculates bitrate as <code>(size × 8) / duration</code>.</li>
    <li><code>fps</code> — Output framerate. 0 = preserve source.</li>
    <li><code>maxWidth</code> — Scale down (lanczos), aspect ratio preserved.</li>
    <li><code>videoPreset</code> — <code>ultrafast</code> / <code>fast</code> / <code>medium</code> / <code>slow</code></li>
  </ul>

  <h2>Audio options</h2>
  <ul>
    <li><code>audioFormat</code> — <code>mp3</code>, <code>aac</code>, <code>ogg</code>, <code>opus</code>, <code>flac</code>, <code>wav</code></li>
    <li><code>audioBitrate</code> — kbps. Defaults: mp3→192, aac→160, ogg→128, opus→96.</li>
    <li><code>audioSampleRate</code> — 0 = preserve source rate.</li>
    <li><code>stripMetadata</code> — Remove ID3/tags (<code>-map_metadata -1</code>).</li>
  </ul>

  <h2>GIF options</h2>
  <ul>
    <li><code>gifToVideo</code> — Convert to WebM VP9 instead of re-optimising as GIF.</li>
    <li><code>quality</code> — Controls palette size: 16–256 colours.</li>
    <li><code>maxWidth</code> — Lanczos resize before palette generation.</li>
    <li><code>fps</code> — Framerate decimation.</li>
  </ul>

  <h2>PDF OCR options</h2>
  <ul>
    <li><code>engine</code> — <code>auto</code>, <code>tesseract</code>, <code>paddle</code></li>
    <li><code>language</code> — <code>auto</code>, <code>eng</code>, <code>fra</code>, <code>deu</code>, <code>spa</code>, <code>chi_sim</code>, <code>chi_tra</code>, <code>jpn</code>, <code>kor</code>, <code>ara</code>, <code>hin</code>, and more</li>
    <li><code>renderDpi</code> — 150–400 DPI. Default 250. Higher = better accuracy, slower.</li>
    <li><code>overlayMode</code> — Add invisible text over original PDF vs. new image PDF.</li>
    <li><code>extractText</code> — Also export a <code>.txt</code> file.</li>
  </ul>

  <h2>Deployment</h2>
  <ul>
    <li><strong>Build command:</strong> <code>npm run build</code></li>
    <li><strong>Output directory:</strong> <code>dist</code></li>
    <li><strong>Framework preset:</strong> Vite</li>
    <li><strong>Node version:</strong> 20+</li>
    <li>The <code>public/_headers</code> file sets COOP/COEP automatically on Cloudflare Pages.</li>
  </ul>

  <h2>Browser compatibility</h2>
  <ul>
    <li><strong>Images:</strong> All modern browsers. AVIF: Chrome 85+, Firefox 93+, Safari 16.1+</li>
    <li><strong>PDF:</strong> All modern browsers</li>
    <li><strong>FFmpeg.wasm (video/audio/GIF):</strong> Chrome 91+, Firefox 91+, Edge 91+, Safari 15.2+</li>
    <li><strong>WebCodecs GPU:</strong> Chrome 94+, Safari 16.4+</li>
    <li><strong>OCR (both engines):</strong> Chrome 91+, Firefox 91+, Safari 15.2+</li>
  </ul>

  <h2>1. Who we are</h2>
  <p>CompressZ is an open-source, client-side web application for file compression and OCR. The application is served as a static website hosted on Cloudflare Pages. Source code is publicly available on GitHub.</p>

  <h2>2. Data we do NOT collect</h2>
  <ul>
    <li>We do <strong>not</strong> collect or store any files you process.</li>
    <li>We do <strong>not</strong> collect names, email addresses, or any personal identifiers.</li>
    <li>We do <strong>not</strong> use cookies for tracking or advertising.</li>
    <li>We do <strong>not</strong> run analytics scripts (no Google Analytics, Mixpanel, or similar).</li>
    <li>We do <strong>not</strong> sell, share, or transfer any data to third parties.</li>
    <li>We do <strong>not</strong> have a backend server that touches your files.</li>
  </ul>

  <h2>3. How file processing works</h2>
  <p>All compression and OCR operations run entirely inside your browser using WebAssembly, the Canvas API, and Web platform APIs. Your files are read from your device into browser memory (RAM), processed locally, and the output is written back to your device. At no point do your files traverse a network connection to our infrastructure.</p>
  <p>You can verify this yourself by opening your browser's Network tab while using CompressZ — you will see no requests containing your file data.</p>

  <h2>4. Third-party libraries loaded at runtime</h2>
  <p>Some compression engines are loaded from CDN on first use and cached by your browser thereafter:</p>
  <ul>
    <li><strong>FFmpeg.wasm</strong> — loaded from <code>esm.sh</code> (video/audio/GIF). These are WebAssembly binaries only; no file data is sent to esm.sh.</li>
    <li><strong>PDF.js</strong> — loaded from <code>cdn.jsdelivr.net</code> (PDF rendering).</li>
    <li><strong>pdf-lib</strong> — loaded from <code>cdn.jsdelivr.net</code> (PDF generation).</li>
    <li><strong>Tesseract.js</strong> — loaded from <code>cdn.jsdelivr.net</code> (OCR model weights).</li>
    <li><strong>PaddleOCR</strong> — loaded from <code>cdn.jsdelivr.net</code> and <code>paddlejs.bj.bcebos.com</code> (OCR model weights).</li>
  </ul>
  <p>These CDN requests are for static assets (JavaScript and model weights) only. Your file content is never included in these requests. Standard CDN access logs (IP address, timestamp, asset requested) may be retained by the CDN providers per their own privacy policies.</p>
  <p>Google Fonts is used for typography and is loaded from <code>fonts.googleapis.com</code>. This may log your IP address per <a href="https://policies.google.com/privacy" target="_blank" rel="noopener" style="color:var(--accent)">Google's privacy policy</a>. To avoid this entirely, you can use CompressZ offline after caching.</p>

  <h2>5. Local storage</h2>
  <p>CompressZ stores two items in your browser's <code>localStorage</code>:</p>
  <ul>
    <li><code>theme</code> — your light/dark mode preference.</li>
    <li><code>sb-collapsed</code> — whether the sidebar is collapsed.</li>
  </ul>
  <p>These values never leave your device. No file metadata, file names, or any other information is stored in localStorage.</p>

  <h2>6. Hosting and infrastructure</h2>
  <p>CompressZ is served from <strong>Cloudflare Pages</strong>. When you access the website, Cloudflare's servers handle the HTTP request to deliver the static HTML, CSS, and JavaScript files. Cloudflare may log access requests (IP address, browser user agent, timestamp) per their <a href="https://www.cloudflare.com/privacypolicy/" target="_blank" rel="noopener" style="color:var(--accent)">privacy policy</a>. These logs do not contain your file data.</p>

  <h2>7. Children's privacy</h2>
  <p>CompressZ does not knowingly collect any information from anyone, including children under 13. Because we collect no personal data whatsoever, there is nothing age-specific to disclose.</p>

  <h2>8. Changes to this policy</h2>
  <p>If we make material changes to this policy, we will update the "Last updated" date at the top. Because CompressZ collects no contact information, we cannot notify you directly — please check this page periodically if you are concerned.</p>

  <h2>9. Contact</h2>
