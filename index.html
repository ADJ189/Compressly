<!-- ── ABOUT ──────────────────────────────────────────────────── -->
<template id="tpl-about">
  <div class="content-page">
    <h1>How Compressly Works</h1>
    <p>Compressly is a 100% client-side compression tool built with TypeScript and Vite. Your files never leave your device. All processing uses WebAssembly, the Canvas API, and modern Web platform APIs.</p>

    <h2>Technology Stack</h2>
    <div class="tech-grid">
      <div class="tech-card">
        <h3>🦀 FFmpeg.wasm</h3>
        <p>Compiled Rust/C FFmpeg to WebAssembly. Handles video (H.264/H.265/VP9/AV1), audio (MP3/AAC/Opus/OGG/FLAC/WAV), and GIF compression with full codec support. Multithreaded when SharedArrayBuffer is available.</p>
      </div>
      <div class="tech-card">
        <h3>🖼️ Canvas API</h3>
        <p>OffscreenCanvas + ImageBitmap for hardware-accelerated image decoding and encoding. WebP and AVIF are natively encoded by the browser's own codec (GPU path in Chrome).</p>
      </div>
      <div class="tech-card">
        <h3>📄 PDF.js + pdf-lib</h3>
        <p>PDF.js 4.4 renders each page to a canvas at configurable DPI. pdf-lib 1.17 repackages the re-compressed images into a new PDF document. Pure JavaScript, no WASM, no server needed.</p>
      </div>
      <div class="tech-card">
        <h3>🎬 WebCodecs</h3>
        <p>W3C API for hardware-accelerated video encode/decode. Used as the GPU tier-2 fallback when FFmpeg.wasm is unavailable. Supported in Chrome 94+ and Safari 16.4+.</p>
      </div>
      <div class="tech-card">
        <h3>⚡ Vite + TypeScript</h3>
        <p>The project is a standard Vite app with strict TypeScript. No framework — pure DOM manipulation with typed components. Deploys to Cloudflare Pages in seconds.</p>
      </div>
      <div class="tech-card">
        <h3>〽️ SVG Engine</h3>
        <p>Zero-dependency TypeScript SVG optimiser. Strips XML declarations, comments, metadata, Inkscape/Sodipodi namespaces, empty groups, compacts path data, and rounds coordinates.</p>
      </div>
    </div>

    <h2>Privacy Guarantee</h2>
    <p>Compressly has no backend. No files are uploaded anywhere. All processing happens on your device using local compute. You can verify this by watching your Network tab — no file data ever leaves the browser.</p>

    <h2>Image Compression</h2>
    <p>Images are decoded via <code>createImageBitmap()</code> then re-encoded to JPEG/WebP/AVIF/PNG via <code>OffscreenCanvas.convertToBlob()</code>. A 14-iteration binary search hits exact target sizes. AVIF automatically falls back to WebP on Firefox.</p>

    <h2>PDF Compression</h2>
    <p>Each PDF page is rendered at a configurable scale using PDF.js, then re-embedded as a compressed JPEG via pdf-lib. Three presets (Low/Recommended/Extreme) control quality and render scale. A target-size mode binary-searches per-page JPEG quality across 12 iterations.</p>

    <h2>Video Compression</h2>
    <p>Three-tier fallback: (1) FFmpeg.wasm with multithreading when <code>SharedArrayBuffer</code> is available (requires COOP/COEP headers — set automatically on Cloudflare Pages via <code>_headers</code>), (2) WebCodecs API for GPU-accelerated H.264 on Chrome/Safari, (3) MediaRecorder canvas capture as universal fallback.</p>

    <h2>Audio Compression</h2>
    <p>FFmpeg.wasm handles all audio formats: MP3 (libmp3lame), AAC, Vorbis OGG, Opus (VBR mode 10 — best quality-per-bit codec), FLAC level 8, and WAV PCM. Custom bitrate and sample rate controls. Can also extract audio from video containers.</p>

    <h2>GIF Optimisation</h2>
    <p>Two-pass palettegen (up to 256 colours with <code>stats_mode=diff</code>) + paletteuse with Bayer dithering and <code>diff_mode=rectangle</code> — the gold-standard GIF compression pipeline used by professional tools. Alternatively converts to WebM VP9 for 70–95% size reduction.</p>
  </div>
</template>

<!-- ── DOCS ───────────────────────────────────────────────────── -->
<template id="tpl-docs">
  <div class="content-page">
    <h1>Documentation</h1>
    <p>Technical reference for Compressly's compression options and browser compatibility.</p>

    <h2>Image Options</h2>
    <ul>
      <li><code>format</code> — Output format: <code>image/webp</code> (default), <code>image/jpeg</code>, <code>image/png</code>, <code>image/avif</code></li>
      <li><code>quality</code> — 0.01–0.99. Ignored for PNG (always lossless). Default: WebP 0.82, JPEG 0.85, AVIF 0.70.</li>
      <li><code>maxWidth / maxHeight</code> — Downscale if either dimension exceeds the limit (aspect ratio preserved, lanczos).</li>
      <li><code>targetSizeKB</code> — Binary-search quality over 14 iterations to hit this file size. Ignores <code>quality</code>.</li>
    </ul>

    <h2>PDF Options</h2>
    <ul>
      <li><code>pdfCompressionLevel</code>
        <ul>
          <li><code>low</code> — quality 0.85, scale 2.0 (high DPI, minimal loss)</li>
          <li><code>recommended</code> — quality 0.60, scale 1.5 (best balance)</li>
          <li><code>extreme</code> — quality 0.30, scale 1.0 (maximum compression)</li>
        </ul>
      </li>
      <li><code>pdfRenderScale</code> — DPI multiplier (1.0–3.0). Higher = better quality and larger output.</li>
      <li><code>pdfImageFormat</code> — <code>image/jpeg</code> (default, smaller) or <code>image/png</code> (lossless pages).</li>
      <li><code>targetSizeKB</code> — Binary-searches per-page JPEG quality to approximate target total size.</li>
    </ul>

    <h2>Video Options</h2>
    <ul>
      <li><code>videoCodec</code> — <code>h264</code> (default), <code>h265</code>, <code>vp9</code>, <code>vp8</code>, <code>av1</code></li>
      <li><code>quality</code> — 0–1 maps to CRF 18–35 for H.264/H.265; VP9/AV1 use equivalent CRF with <code>-b:v 0</code>.</li>
      <li><code>videoBitrate</code> — Target bitrate in bps (used in bitrate mode).</li>
      <li><code>targetSizeKB</code> — Calculates bitrate as <code>(size × 8) / duration</code> and applies it as max bitrate.</li>
      <li><code>fps</code> — Output framerate. 0 = preserve source FPS.</li>
      <li><code>maxWidth</code> — Scale down keeping aspect ratio (lanczos). Height auto-calculated.</li>
      <li><code>videoPreset</code> — <code>ultrafast</code> / <code>fast</code> (default) / <code>medium</code> / <code>slow</code></li>
    </ul>

    <h2>Audio Options</h2>
    <ul>
      <li><code>audioFormat</code> — <code>mp3</code>, <code>aac</code>, <code>ogg</code>, <code>opus</code>, <code>flac</code>, <code>wav</code></li>
      <li><code>audioBitrate</code> — kbps. Defaults: mp3→192, aac→160, ogg→128, opus→96. Ignored for FLAC/WAV.</li>
      <li><code>audioSampleRate</code> — e.g. 44100, 48000. 0 = preserve source rate.</li>
      <li><code>stripMetadata</code> — Removes ID3/tags/cover art from output (<code>-map_metadata -1</code>).</li>
    </ul>

    <h2>GIF Options</h2>
    <ul>
      <li><code>gifToVideo</code> — Convert to WebM VP9 instead of re-optimising as GIF. Dramatic size savings.</li>
      <li><code>quality</code> — 0–1 controls palette size (16–256 colours). Default 0.82 = 213 colours.</li>
      <li><code>maxWidth</code> — Lanczos resize applied before palette generation.</li>
      <li><code>fps</code> — Target framerate (decimation via FFmpeg <code>fps</code> filter).</li>
    </ul>

    <h2>Deployment</h2>
    <p>The project deploys to Cloudflare Pages automatically via GitHub Actions. The <code>public/_headers</code> file sets the required COOP/COEP headers for SharedArrayBuffer (FFmpeg multithreading).</p>
    <ul>
      <li>Build command: <code>npm run build</code></li>
      <li>Output directory: <code>dist</code></li>
      <li>Node version: 20+</li>
    </ul>

    <h2>Browser Compatibility</h2>
    <ul>
      <li><strong>Images:</strong> All modern browsers. AVIF encoding: Chrome 85+, Firefox 93+, Safari 16.1+.</li>
      <li><strong>PDF:</strong> All modern browsers (PDF.js Canvas 2D + pdf-lib pure JS).</li>
      <li><strong>Video/Audio/GIF (FFmpeg.wasm):</strong> Chrome 91+, Firefox 91+, Edge 91+. Safari 15.2+ (single-threaded).</li>
      <li><strong>Video (WebCodecs GPU tier):</strong> Chrome 94+, Safari 16.4+.</li>
      <li><strong>Multithreaded FFmpeg:</strong> Requires COOP + COEP headers (set by <code>_headers</code> on Cloudflare Pages).</li>
    </ul>
  </div>
